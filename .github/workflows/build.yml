name: Build

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_binary: src-tauri/target/release/ree-pak-rs.exe
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_binary: src-tauri/target/release/ree-pak-rs
          - name: macos-aarch64
            os: macos-15
            target: aarch64-apple-darwin
            artifact_binary: src-tauri/target/release/ree-pak-rs

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            binaryen \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            wget

      - name: Install wasm-opt
        if: runner.os == 'macOS'
        run: brew install binaryen

      - name: Install wasm-opt
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $scoopShims = "$env:USERPROFILE\scoop\shims"
          $env:PATH = "$scoopShims;$env:PATH"
          $scoopShims | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

          Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          Invoke-RestMethod -Uri https://get.scoop.sh | Invoke-Expression
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $env:PATH = "$scoopShims;$env:PATH"

          scoop install binaryen
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify wasm-opt
        run: wasm-opt --version

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri
          cache-on-failure: true

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Run frontend checks
        run: bun run lint

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --workspace --locked

      - name: Build application
        run: bun tauri build --verbose
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Package update artifact
        id: package
        run: bun run release:package -- --target ${{ matrix.target }} --exe ${{ matrix.artifact_binary }}

      - name: Verify update archive extraction
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked --test release_archive packaged_release_archive_extracts_expected_binary
        env:
          REE_PAK_RELEASE_ARCHIVE_PATH: ${{ steps.package.outputs.archive_path }}
          REE_PAK_RELEASE_BIN_PATH: ${{ steps.package.outputs.bin_path_in_archive }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ree-pak-rs-${{ steps.package.outputs.version }}-${{ matrix.target }}
          path: |
            ${{ matrix.artifact_binary }}
            ${{ steps.package.outputs.archive_path }}
            ${{ steps.package.outputs.manifest_path }}
          if-no-files-found: error
          retention-days: 30

      - name: Upload release archives
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v6
        with:
          name: release-archive-${{ matrix.target }}
          path: ${{ steps.package.outputs.archive_path }}
          if-no-files-found: error
          retention-days: 30

  release:
    name: Create draft release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download release archives
        uses: actions/download-artifact@v6
        with:
          pattern: release-archive-*
          path: dist/release
          merge-multiple: true

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          files: dist/release/*
          fail_on_unmatched_files: true
